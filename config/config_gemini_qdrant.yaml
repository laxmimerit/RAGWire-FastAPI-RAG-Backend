embeddings:
  provider: "google"
  model: "models/gemini-embedding-001"   # Stable, recommended for production
  api_key: "${GOOGLE_API_KEY}"

llm:
  provider: "google"
  model: "gemini-2.5-flash"              # Best price/performance
  api_key: "${GOOGLE_API_KEY}"

vectorstore:
  url: "${QDRANT_URL}"
  api_key: "${QDRANT_API_KEY}"
  collection_name: "finance-rag-google-qdrant"
  use_sparse: true
  force_recreate: false

retriever:
  search_type: "hybrid" # "similarity" | "mmr" | "hybrid"
  top_k: 5
  auto_filter: false   # set true to enable LLM-based filter extraction from every query


metadata:
  config_file: "config/finance_metadata.yaml"   # Custom fields (see Custom Metadata docs)
                                 # If omitted, defaults to: company_name,
                                 # doc_type, fiscal_quarter, fiscal_year

logging:
  level: "INFO"  # "DEBUG" | "INFO" | "WARNING" | "ERROR" | "CRITICAL"
  console_output: true  # true | false
  colored: false  # true | false
  log_file: "./.log/ragwire.log"
